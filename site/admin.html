<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page">
    <nav class="nav">
      <div class="container">
        <a href="/" class="nav-brand">
          <img src="" alt="" style="display:none">
          <span class="nav-brand-text">Wild Lychee</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <main class="page-content">
      <div class="container">
        <h2 class="mb-2">Dashboard</h2>

        <div class="stats-grid mb-2">
          <div class="card stat-card">
            <div class="stat-value" id="stat-active">—</div>
            <div class="stat-label">Active Members</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value" id="stat-pending">—</div>
            <div class="stat-label">Pending Approval</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value" id="stat-announcements">—</div>
            <div class="stat-label">Announcements</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value" id="stat-expiring">—</div>
            <div class="stat-label">Expiring (30d)</div>
          </div>
        </div>

        <div class="stats-grid mb-2" id="extra-stats"></div>

        <div class="card mb-2 hidden" id="insights-section">
          <h3 class="mb-1">Members Needing Attention</h3>
          <div id="insights-list"></div>
        </div>

        <div class="card mb-2 hidden" id="moderation-section">
          <h3 class="mb-1">Moderation Queue</h3>
          <div id="moderation-list"></div>
        </div>

        <div class="card mb-2 hidden" id="newsletter-section">
          <h3 class="mb-1">Newsletter Drafts</h3>
          <div id="newsletter-list"></div>
          <div id="newsletter-editor" class="hidden" style="margin-top:1rem">
            <input type="text" id="newsletter-subject" class="input mb-1" placeholder="Subject">
            <div id="newsletter-body" style="min-height:200px;border:1px solid var(--color-border);border-radius:var(--radius);padding:1rem"></div>
            <div class="flex gap-1 mt-1">
              <button class="btn btn-primary" id="newsletter-send">Approve &amp; Send</button>
              <button class="btn btn-secondary" id="newsletter-regenerate">Regenerate</button>
              <button class="btn btn-secondary" id="newsletter-back">Back</button>
            </div>
          </div>
        </div>

        <div class="card mb-2">
          <h3 class="mb-1">Quick Actions</h3>
          <div class="flex gap-1" style="flex-wrap:wrap">
            <a href="/admin-members.html" class="btn btn-secondary">Manage Members</a>
            <a href="/admin-settings.html" class="btn btn-secondary">Site Settings</a>
            <a href="/" class="btn btn-secondary">View Site</a>
          </div>
        </div>

        <div class="card">
          <h3 class="mb-1">Recent Activity</h3>
          <div id="activity-feed"></div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>Powered by <a href="https://wildlychee.com">Wild Lychee</a></p>
      </div>
    </footer>
  </div>

  <script src="/js/env.js"></script>
  <script type="module">
    import { init } from './js/config.js';
    await init();
    import { initDashboard } from './js/admin.js';
    await initDashboard();
  </script>
</body>
</html>
