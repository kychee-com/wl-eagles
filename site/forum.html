<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .forum-category { display: block; text-decoration: none; color: inherit; border-left: 4px solid var(--color-primary); transition: box-shadow var(--transition); }
    .forum-category:hover { box-shadow: var(--shadow-md); color: inherit; }
    .forum-category-name { font-weight: 600; font-size: 1.1rem; }
    .forum-category-desc { color: var(--color-text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
    .forum-category-count { font-size: 0.8125rem; color: var(--color-text-muted); margin-top: 0.5rem; }

    .forum-topic-row { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1rem; border-bottom: 1px solid var(--color-border); transition: background var(--transition); }
    .forum-topic-row:hover { background: var(--color-surface); }
    .forum-topic-row.pinned { background: rgba(99, 102, 241, 0.03); border-left: 3px solid var(--color-primary); }
    .forum-topic-row.hidden-topic { opacity: 0.5; }
    .forum-topic-title { font-weight: 600; font-size: 0.9375rem; color: var(--color-text); }
    .forum-topic-title:hover { color: var(--color-primary); }
    .forum-topic-meta { font-size: 0.8125rem; color: var(--color-text-muted); margin-top: 0.125rem; }
    .forum-topic-info { flex: 1; min-width: 0; }
    .forum-topic-stats { display: flex; gap: 1.5rem; font-size: 0.8125rem; color: var(--color-text-muted); white-space: nowrap; }

    .forum-post { padding: 1.25rem; border-bottom: 1px solid var(--color-border); }
    .forum-post:last-child { border-bottom: none; }
    .forum-post.hidden-post { opacity: 0.5; background: rgba(239, 68, 68, 0.03); }
    .forum-post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .forum-post-author { font-weight: 600; font-size: 0.9375rem; }
    .forum-post-date { font-size: 0.8125rem; color: var(--color-text-muted); }
    .forum-post-body { font-size: 0.9375rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .forum-post-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .forum-admin-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--color-border); }

    .forum-breadcrumb { font-size: 0.875rem; color: var(--color-text-muted); margin-bottom: 1.5rem; }
    .forum-breadcrumb a { color: var(--color-primary); }

    .forum-reply-form { margin-top: 1.5rem; }
    .forum-new-topic-form { margin-top: 1.5rem; }

    .forum-locked-notice { padding: 1rem 1.25rem; background: var(--color-surface); border-radius: var(--radius); color: var(--color-text-muted); font-size: 0.875rem; margin-top: 1.5rem; text-align: center; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <div class="container">
        <a href="/" class="nav-brand"><img src="" alt="" style="display:none"><span class="nav-brand-text">Wild Lychee</span></a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <main class="page-content">
      <div class="container">
        <div id="forum-root"></div>
      </div>
    </main>

    <footer class="footer"><div class="container"><p>Powered by <a href="https://wildlychee.com">Wild Lychee</a></p></div></footer>
  </div>

  <script src="/js/env.js"></script>
  <script type="module">
    import { init } from './js/config.js';
    await init();
    import { initForum } from './js/forum.js';
    await initForum();
  </script>
</body>
</html>
