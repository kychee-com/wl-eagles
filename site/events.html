<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page">
    <nav class="nav">
      <div class="container">
        <a href="/" class="nav-brand"><img src="" alt="" style="display:none"><span class="nav-brand-text">Wild Lychee</span></a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <main class="page-content">
      <div class="container">
        <div class="flex justify-between items-center mb-2">
          <h2>Events</h2>
          <button class="btn btn-primary hidden" id="event-create-btn">Create Event</button>
        </div>
        <div id="events-list"></div>
      </div>
    </main>

    <!-- Event Create Modal -->
    <div class="auth-modal hidden" id="event-form-modal">
      <div class="auth-panel" style="max-width:32rem">
        <h3 class="mb-1">Create Event</h3>
        <form id="event-form">
          <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="ef-title" required></div>
          <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="ef-description"></textarea></div>
          <div class="form-group"><label class="form-label">Location</label><input class="form-input" id="ef-location"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
            <div class="form-group"><label class="form-label">Starts</label><input class="form-input" id="ef-starts" type="datetime-local" required></div>
            <div class="form-group"><label class="form-label">Ends</label><input class="form-input" id="ef-ends" type="datetime-local"></div>
          </div>
          <div class="form-group"><label class="form-label">Capacity (0 = unlimited)</label><input class="form-input" id="ef-capacity" type="number" min="0" value="0"></div>
          <label class="flex items-center gap-1 mb-2"><input type="checkbox" id="ef-members-only"> Members only</label>
          <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">Create</button>
            <button type="button" class="btn btn-secondary" id="event-form-cancel">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="footer"><div class="container"><p>Powered by <a href="https://wildlychee.com">Wild Lychee</a></p></div></footer>
  </div>

  <script src="/js/env.js"></script>
  <script type="module">
    import { init } from './js/config.js';
    await init();
    import { initEvents } from './js/events.js';
    await initEvents();
  </script>
</body>
</html>
